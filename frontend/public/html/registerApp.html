<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/registrate.css">
    <title>GrabGo | Register</title>
</head>

<body>

    <!-- Registro -->

    <div class="container">

        <form action="" method="post" class="formulario">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <label for="userName" class="nombreInput">Nombre:</label>
            <input type="text" id="userName" name="userName" placeholder="Ingrese su nombre" required>

            <label for="correo" class="nombreInput">Correo:</label>
            <input type="text" id="correo" name="correo" placeholder="Ingrese su correo" required>

            <label for="contrasena" class="nombreInput">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña" required>

            <button type="submit" id="btnEnviar">Registrarse</button>

            <a href="../index.html" class="redireccion" id="registro">¿Ya tienes una cuenta?</a>

        </form>
    </div>



</body>

</html>
