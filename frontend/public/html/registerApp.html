<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/formularios.css">
    <title>Grab&Go | Registro</title>
</head>

<body>

    <!-- Registro -->

    <div class="container">

        <form action="/auth/register" id="registerForm" method="post" class="formulario">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <div class="container-input">
                <label for="userName" class="nombreInput">Nombre</label>
                <input type="text" id="userName" class="datos" placeholder="Ingrese su nombre">
                <p id="errorUsuario" class="error"></p>
            </div>

            <div class="container-input">
                <label for="correo" class="nombreInput">Correo</label>
                <input type="text" id="correo" class="datos" placeholder="Ingrese su correo">
                <p id="errorCorreo" class="error"></p>
            </div>

            <label for="contrasena" class="nombreInput">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña" class="datos" required>
               <p id="errorContrasena" class="error"></p>
            <button type="submit" id="btnEnviar">Registrarse</button>

            <a href="../index.html" class="redireccion">
                ¿Ya tienes una cuenta?
            </a>

        </form>
    </div>

    <script src="../js/registo.js"></script>

</body>

</html>
