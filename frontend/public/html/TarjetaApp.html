<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/formularios.css">
    <title>Grab&Go | Registro</title>
</head>

<body>

    <!-- Registro -->

    <div class="container">

        <form action="/auth/register" method="post" id="registerForm" method="post" class="formulario">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <div class="container-input">
                <label for="userName" class="nombreInput">Nombre del titular</label>
                <input type="text" id="userName" name="userName" class="datos" placeholder="Jhon Doe" required>
                <p id="errorUsuario" class="error"></p>
            </div>

            <div class="container-input">
                <label for="numeracion" class="nombreInput">N° de tarjeta</label>
                <input type="text" id="correo" name="numeracion" class="datos" placeholder="1234 5678 9123" minlength="15" maxlength="16" inputmode="numeric" required>
                <p id="errorCorreo" class="error"></p>
            </div>

            <label for="nvv" class="nombreInput">NVV</label>
            <input type="password" id="contrasena" name="nvv" placeholder="Ingrese su código" class="datos"
                required minlength="3" maxlength="3" inputmode="numeric">
            <p id="errorContrasena" class="error"></p>
            <button type="submit" id="btnEnviar">Confirmar</button>

        </form>
    </div>

    <!-- <script src="../js/registo.js"></script> -->

</body>

</html>
