<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/formularios.css">
    <title>GrabGo | Login</title>
</head>

<body>

    <div class="container">

        <form id="loginForm" class="formulario" method="post" action="">

            <h1 class="tituloPrincipal">Grab & Go</h1>

            <div class="container-input">

                <label for="userName" class="nombreInput">Usuario</label>
                <input type="text" id="userName" class="datos" name="userName" placeholder="Usuario" required
                    autocomplete="off">
             <p id="errorUsuario" class="error"></p>
            </div>

            <div class="container-input">

            <label for="contrasena" class="nombreInput">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" required class="datos">
            <p id="errorContrasena" class="error"></p>
            <button type="submit" id="btnEnviar">Iniciar sesión</button>
            
            <a href="./html/registerApp.html" class="redireccion">
                ¿No tienes una cuenta?
            </a>
            </div>

        </form>
    </div>

    <script src="js/index.js"></script>

</body>

</html>
